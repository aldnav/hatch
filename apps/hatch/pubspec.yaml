name: hatch
description: Hatch — free, open-source, self-hostable travel planner.
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  core:
    path: ../../packages/core
  drift: ^2.18.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  path: ^1.9.0
  path_provider: ^2.1.3
  riverpod_annotation: ^2.3.5
  sqlite3_flutter_libs: ^0.5.24
  supabase_flutter: ^2.5.5
  ui:
    path: ../../packages/ui
  uuid: ^4.4.0

dev_dependencies:
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.3
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
